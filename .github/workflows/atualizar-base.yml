name: Atualizar base de indicadores
on:
  schedule:
    # 07:15 UTC = 04:15 em Fortaleza (horário de baixo tráfego, antes do
    # expediente) — ajustar se a cadência de atualização da fonte mudar.
    - cron: '15 7 * * *'
  workflow_dispatch: {}
  # Permite que outro sistema (ex.: automação que gera a planilha) dispare
  # a atualização assim que uma base nova estiver pronta, sem esperar o
  # cron. Ver "Instruções para atualização futura da base" no RELATORIO.md.
  repository_dispatch:
    types: [nova-base-disponivel]

permissions:
  contents: write # precisa escrever (commit) o CSV publicado de volta no repo

concurrency:
  group: atualizar-base-indicadores
  cancel-in-progress: false # nunca cancelar uma publicação no meio

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true # necessário pro passo de commit/push no final

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Testes do ETL (parsing, validação, normalização)
        run: node --test scripts/etl/__tests__/*.test.mjs src/config/__tests__/*.test.mjs src/utils/__tests__/*.test.mjs

      - name: Baixar base oficial (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta consolidado_canais_semanal.csv > /tmp/base.csv

      - name: Baixar metas gerais de cidade — FTTH e 5G (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta metas_cidades_vendas_instaladas.csv > /tmp/metas.csv

      - name: Baixar lista oficial de cidades FTTH/5G/FWA (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta cidades_atuais.csv > /tmp/cidades-oficiais.csv

      # Lista fechada de cidades FTTH — fonte PRÓPRIA, separada da planilha
      # de cidades atuais (que é só 5G). Ver normalizarCidadesOficiais em
      # src/shared/csvIndicadores.js.
      - name: Baixar lista oficial de cidades FTTH (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta cidades_ftth.csv > /tmp/cidades-ftth.csv

      # Nomes confirmados na pasta do Drive (ver log de erro do workflow em
      # 17/07/2026: a Service Account listou os 5 arquivos existentes).
      - name: Baixar Dicionário de Metas (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta dicionario_indicadores_produtos.csv > /tmp/dicionario-metas.csv

      - name: Baixar Fato de Metas por vendedor/canal/cidade (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta metas_vendedores_por_cidade.csv > /tmp/metas-vendedores-por-cidade.csv

      # Calendário comercial (dias úteis) pro rateio semanal de Meta do
      # Indicador — ver utils/diasUteis.js. É um ledger de dias já
      # ocorridos (nunca cobre o futuro); publicarDiasUteis.mjs só
      # valida o formato, não exige cobertura completa do ano.
      - name: Baixar Dias Úteis (Google Drive)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: node scripts/etl/baixarBaseGoogleDrive.mjs --pasta dias_acum_uteis.csv > /tmp/dias-uteis.csv

      - name: Validar e normalizar (gera public/dados/*.csv e *.json)
        run: node scripts/etl/gerarBase.mjs /tmp/base.csv /tmp/metas.csv /tmp/cidades-oficiais.csv /tmp/cidades-ftth.csv

      - name: Consolidar Meta por Canal — Criado/Efetivado/Instalado/Ativado 5G (gera public/dados/metas-por-canal.csv)
        run: node scripts/etl/consolidarMetaPorCanal.mjs /tmp/dicionario-metas.csv /tmp/metas-vendedores-por-cidade.csv

      # Sistema de Quintil: reutiliza a mesma fato do passo acima. Publica
      # o agregado por cidade e o detalhamento enxuto por vendedor×canal,
      # usado no recálculo dos filtros; matrícula, hash e a base crua
      # continuam restritos ao workflow.
      - name: Consolidar Quintis por cidade e vendedor
        run: node scripts/etl/consolidarQuintis.mjs /tmp/dicionario-metas.csv /tmp/metas-vendedores-por-cidade.csv

      # Desvio por Canal: desvio absoluto (realizado − meta) por canal × cidade
      # × tecnologia × mês — só indicadores principais de venda (Instalação
      # no FTTH, Ativação no 5G). Reusa a fato já baixada, sem download novo.
      - name: Consolidar Desvio por Canal (gera public/dados/desvio-por-canal.csv)
        run: node scripts/etl/consolidarDesvioPorCanal.mjs /tmp/metas-vendedores-por-cidade.csv

      - name: Validar e publicar Dias Úteis (gera public/dados/dias-uteis.csv)
        run: node scripts/etl/publicarDiasUteis.mjs /tmp/dias-uteis.csv

      - name: Publicar log de falha como artefato (só roda se o passo acima falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-falha-validacao
          path: ultima-execucao-falhou.json
          if-no-files-found: ignore

      # Só chega aqui se gerarBase.mjs terminou com sucesso — se a
      # validação reprovou, o job já falhou no passo anterior e nada é
      # commitado: a última versão publicada (o que já está em `main`)
      # continua sendo a que o front serve. É a estratégia de rollback
      # inteira: nunca existe "commit parcial".
      # `git add public/dados` (pasta inteira, não arquivo por arquivo):
      # listar nomes manualmente já causou 2 incidentes — desalinha toda
      # vez que um script de ETL muda o nome/particionamento de um
      # arquivo (aconteceu no particionamento por canal e quase de novo
      # com dias-uteis.csv). Todo conteúdo da pasta é gerado por este
      # workflow, então "tudo que tiver lá" é sempre o que deve ser
      # commitado — sem lista pra manter sincronizada.
      - name: Commitar base atualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/dados
          if git diff --cached --quiet; then
            echo "Nada mudou na base — nenhum commit necessário."
          else
            git commit -m "chore(dados): atualizar indicadores realizados"
            git push
          fi

      # O commit acima entra em `main` como qualquer outro push, então o
      # `deploy.yml` já existente dispara sozinho e publica o site com o
      # CSV novo — não foi preciso mexer no deploy.

      # A base baixada crua nunca é commitada nem sobe como artefato: só o
      # resultado já validado/normalizado (sem granularidade de canal) vai
      # pro repositório.