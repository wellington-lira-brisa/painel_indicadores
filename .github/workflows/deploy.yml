name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Testes (unidade + ETL) — bloqueia o deploy se algo quebrar
        run: node --test scripts/etl/__tests__/*.test.mjs src/config/__tests__/*.test.mjs src/utils/__tests__/*.test.mjs src/shared/__tests__/*.test.mjs
      - run: npm run build
        env:
          # VITE_ é embutido no bundle em build-time — normal pra URL +
          # chave anon do Supabase, que já são feitas pra rodar no
          # navegador (a segurança real está nas policies de RLS, não em
          # esconder essas duas). Sem isso aqui, supabaseClient.js recebe
          # `undefined` e lança o erro que você viu.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Fallback de SPA pro GitHub Pages
        # BrowserRouter usa URLs reais (/cidades/araripina-pe), mas GitHub
        # Pages é hospedagem estática: um reload ou link direto pra essa
        # URL bate no servidor ANTES do React Router existir, e como não
        # existe arquivo nesse caminho, o Pages devolve o 404 genérico
        # dele. Publicar o mesmo index.html também como 404.html faz o
        # Pages servir a SPA pra qualquer caminho não encontrado; o React
        # Router então lê a URL real do navegador e renderiza a página
        # certa client-side. Precisa rodar depois do build (dist/ só
        # existe a partir daqui).
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4